<!-- components/topbar.html -->
<div id="topbar">
  <div class="tb-brand">
    <div class="title">BANCO DE TESTE · ALTÍMETROS</div>
    <div class="sub">UFPB · ENG. COMPUTAÇÃO · TCC 2026</div>
  </div>
  <div class="tb-stats">
    <div class="tb-stat"><span class="k">ALTITUDE</span><span class="v v-teal" id="h-alt">0.0 m</span></div>
    <div class="tb-stat"><span class="k">PRESSÃO</span><span class="v" id="h-pres">— hPa</span></div>
    <div class="tb-stat"><span class="k">P. REF.</span><span class="v" id="h-pref">— hPa</span></div>
    <div class="tb-stat"><span class="k">APOGEU MÁX.</span><span class="v v-amber" id="h-amax">0 m</span></div>
    <div class="tb-stat"><span class="k">TEMPO</span><span class="v" id="h-t">0.0 s</span></div>
    <div class="tb-stat"><span class="k">HARDWARE</span><span class="v" id="h-hw">—</span></div>
  </div>
  <div class="tb-right">
    <span id="user-label" style="font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text1);"></span>
    <button id="btn-logout"
      style="display:none;padding:4px 12px;background:transparent;border:1px solid var(--line2);border-radius:20px;color:var(--text2);font-family:var(--mono);font-size:10px;cursor:pointer;">
      Sair
    </button>
    <div class="conn-badge" id="cbadge"><div class="conn-dot"></div><span id="ctxt">OFFLINE</span></div>
    <div id="clock">--:--:--</div>
  </div>
</div>
